function stripBrackets(t){return t.replace(/[（(][^）)]{0,60}[）)]/g,'').replace(/\s+/g,' ').trim()}

function startTTS(){
  if(!thaiText){showToast('請先完成翻譯');return}
  if(playing){stopTTS();return}
  const clean=stripBrackets(thaiText);
  if(!clean){showToast('沒有泰文可播放');return}
  playing=true;
  playBtn.classList.add('on');pIco.textContent='⏹';
  pLabel.textContent='播放中 · กำลังเล่น';
  pSub.textContent=`語速：${spkRate<=0.6?'慢速':spkRate>=1.1?'快速':'正常'} · 點擊停止`;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='th-TH';u.rate=spkRate;u.pitch=1.05;u.volume=1;
  const v=getThaiVoice();if(v)u.voice=v;
  u.onend=()=>{stopTTS();if(looping)loopTimer=setTimeout(startTTS,1200)};
  u.onerror=()=>stopTTS();
  speechSynthesis.speak(u);
}
function stopTTS(){playing=false;speechSynthesis.cancel();clearTimeout(loopTimer);playBtn.classList.remove('on');pIco.textContent='🔊';pLabel.textContent='聆聽泰文發音';pSub.textContent='點擊播放 · กดเพื่อฟัง'}

playBtn.addEventListener('click',startTTS);
repBtn.addEventListener('click',()=>{looping=!looping;repBtn.classList.toggle('on',looping);showToast(looping?'🔁 循環播放已開啟':'循環播放已關閉');if(!looping)clearTimeout(loopTimer)});
document.querySelectorAll('.sb').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.sb').forEach(x=>x.classList.remove('on'));b.classList.add('on');spkRate=parseFloat(b.dataset.r);showToast('語速：'+b.textContent);if(playing){stopTTS();setTimeout(startTTS,80)}})});

function setLabels(){
  const zh=dir==='zh-th';
  G('srcLbl').textContent=zh?'中文':'ภาษาไทย';G('srcLbl').className='lbadge '+(zh?'zh':'th');
  G('tgtLbl').textContent=zh?'ภาษาไทย':'中文';G('tgtLbl').className='lbadge '+(zh?'th':'zh');

function detectLang(t){const th=(t.match(/[\u0E00-\u0E7F]/g)||[]).length,zh=(t.match(/[\u4E00-\u9FFF\u3400-\u4DBF]/g)||[]).length;if(th>0&&th>zh)return'th-zh';if(zh>0&&zh>=th)return'zh-th';return dir}
function updateDetect(t){if(!t.trim()){G('detLbl').textContent='等待輸入…';return}const d=detectLang(t);G('detLbl').textContent=d==='zh-th'?'偵測到：中文 → 泰文':'ตรวจพบ：ภาษาไทย → 中文';if(d!==dir){dir=d;setLabels()}}

G('cpyBtn').addEventListener('click',doCopy);G('cpyOutBtn').addEventListener('click',doCopy);

transBtn.addEventListener('click',doTranslate);

// ══ TRANSLATE ══
async function doTranslate(srcOverride){
  const src=(srcOverride||inp.value).trim();
  if(!src||busy){if(!src){inp.focus();showToast('請輸入文字')}return}
  busy=true;stopTTS();apiNote.classList.remove('show');
  transBtn.disabled=true;transBtn.innerHTML='<span><span class="spin"></span>翻譯中…</span>';
  out.innerHTML='<span class="ph-out">翻譯中，請稍候…</span>';
  pronun.style.display='none';speakPanel.classList.remove('show');
  outCC.textContent='';thaiText='';pronText='';
  const isZhTh=dir==='zh-th';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'content-type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:512,system:isZhTh?SYS_ZH:SYS_TH,messages:[{role:'user',content:src}]})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));const msg=e?.error?.message||'';if(res.status===429||res.status===529||msg.includes('exceeded')){apiNote.classList.add('show');throw new Error('API 用量達上限，請稍後再試')}throw new Error(msg||`HTTP ${res.status}`)}
    const data=await res.json();
    const raw=(data.content||[]).map(b=>b.text||'').join('').trim();
    if(!raw)throw new Error('翻譯結果為空，請再試一次');
    await renderResult(raw,isZhTh,src);
  }catch(e){out.innerHTML=`<span class="err-msg">⚠ ${e.message}</span>`}
  finally{busy=false;transBtn.disabled=false;transBtn.innerHTML='<span>✦ 立即翻譯</span>'}
}

// ══ RENDER ══
async function renderResult(raw,isZhTh,src){
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  let main='',pron='';
  for(const l of lines){if(l.startsWith('📢'))pron=l.replace('📢','').trim();else if(!main)main=l}
  if(!main)main=raw;
  out.textContent=main;outCC.textContent=main.length+' 字';
  if(pron){pronun.textContent='📢 '+pron;pronun.style.display='block';pronText=pron}
  if(isZhTh){thaiText=main;speakPanel.classList.add('show')}
  else{thaiText='';speakPanel.classList.remove('show')}
  if(db){await dbAdd({src,tgt:main,pron,dir:isZhTh?'中→泰':'泰→中',ts:Date.now()});renderHist(await dbAll())}
  showToast('✓ 翻譯完成');
}

// ══ PHRASES ══
function renderPhrases(){
  const bar=G('suggBar'),list=PHRASES[dir]||[];
  bar.innerHTML=list.map(s=>`<button class="sugg">${s}</button>`).join('');
  bar.querySelectorAll('.sugg').forEach(b=>{b.addEventListener('click',()=>{if(busy)return;inp.value=b.textContent;inCC.textContent=inp.value.length+' 字';updateDetect(inp.value);doTranslate(b.textContent)})});
}

// ══ HISTORY ══
function fmtDate(ts){const d=new Date(ts),now=new Date(),df=now-d;if(df<60e3)return'剛剛';if(df<3600e3)return Math.floor(df/60e3)+'分鐘前';if(df<86400e3)return Math.floor(df/3600e3)+'小時前';if(df<604800e3)return Math.floor(df/86400e3)+'天前';return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}

function renderHist(items){
  const sec=G('histSec'),list=G('histList');
  if(!items?.length){sec.style.display='none';return}
  sec.style.display='block';G('histMeta').textContent=`共 ${items.length} 筆 · 永久保存`;
  list.innerHTML=items.map(h=>`<div class="hi" data-id="${h.id}"><div class="hi-top"><span class="hd2">✦ ${esc(h.dir)}</span><div class="hi-right"><span class="h-date">${fmtDate(h.ts)}</span><button class="hi-del" data-id="${h.id}">✕</button></div></div><div class="hi-src">${esc(h.src)}</div><div class="hi-tgt">${esc(h.tgt)}</div></div>`).join('');
  list.querySelectorAll('.hi').forEach(el=>{el.addEventListener('click',e=>{if(e.target.classList.contains('hi-del'))return;const h=items.find(x=>x.id===+el.dataset.id);if(!h)return;stopTTS();inp.value=h.src;inCC.textContent=h.src.length+' 字';out.textContent=h.tgt;outCC.textContent=h.tgt.length+' 字';if(h.pron){pronun.textContent='📢 '+h.pron;pronun.style.display='block';pronText=h.pron}else{pronun.style.display='none';pronText=''}if(h.dir==='中→泰'){thaiText=h.tgt;speakPanel.classList.add('show')}else{thaiText='';speakPanel.classList.remove('show')}updateDetect(h.src);window.scrollTo({top:0,behavior:'smooth'})})});
  list.querySelectorAll('.hi-del').forEach(b=>{b.addEventListener('click',async e=>{e.stopPropagation();await dbDel(+b.dataset.id);renderHist(await dbAll());showToast('已刪除此筆')})});
}
